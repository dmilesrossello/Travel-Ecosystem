<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Juniper Group — Travel Software Companies</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--red:#C0392B;--red-light:#FDECEA;--red-mid:#E6A8A2;--charcoal:#2C2C2C;--dark:#1A1A1A;--text:#2C2C2C;--text-mid:#555;--text-light:#888;--bg:#FFF;--bg-off:#F5F5F3;--bg-warm:#FAF8F5;--border:#E5E2DD;--teal:#009B9B;--teal-light:#E6F5F5;--teal-mid:#B3E0E0;--green:#00A676;--green-bg:#E8F7F1;--yellow:#D4920B;--yellow-bg:#FFF8E8;--purple:#6B4FBB;--purple-bg:#F0ECF9;--shadow:0 2px 8px rgba(0,0,0,.06)}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;-webkit-font-smoothing:antialiased}

/* NAV */
.topbar{background:var(--charcoal);padding:10px 32px;display:flex;align-items:center;gap:16px}
.topbar img{height:28px}
.topbar .tb-title{color:#fff;font-size:.82rem;font-weight:700;letter-spacing:-.01em}
.topbar .tb-sub{color:rgba(255,255,255,.4);font-size:.6rem;margin-left:4px}
.nav{display:flex;gap:0;padding:0 32px;max-width:1600px;margin:0 auto;border-bottom:2px solid var(--border);overflow-x:auto;background:var(--bg)}
.nav-btn{background:none;border:none;border-bottom:3px solid transparent;color:var(--text-light);padding:11px 16px;font-family:inherit;font-size:.7rem;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap}
.nav-btn:hover{color:var(--red)}
.nav-btn.on{color:var(--red);border-bottom-color:var(--red)}

/* VIEWS */
.view{display:none;max-width:1600px;margin:0 auto;padding:24px 48px 48px}
.view.active{display:block}

/* ===== SHARED SECTION STYLES ===== */
.sec-title{font-size:1.8rem;font-weight:800;color:var(--charcoal);margin-bottom:6px;line-height:1.15}
.sec-bar{width:60px;height:4px;background:var(--red);border-radius:2px;margin-bottom:16px}
.sec-sub{font-size:.82rem;color:var(--text-mid);line-height:1.6;max-width:700px}
.dot-grid{position:absolute;display:grid;grid-template-columns:repeat(4,6px);gap:8px;opacity:.15}
.dot-grid span{width:6px;height:6px;border-radius:50%;background:var(--charcoal)}

/* ===== HOME TAB ===== */
.home-hero{background:var(--bg-warm);border:1px solid var(--border);border-radius:12px;padding:40px 44px;margin-bottom:28px;position:relative;overflow:hidden;text-align:center}
.home-hero .dot-grid{top:16px;right:20px}
.home-hero .hh-tag{font-size:.55rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--red);margin-bottom:8px}
.home-hero h1{font-size:2.2rem;font-weight:800;color:var(--charcoal);line-height:1.15;margin-bottom:6px}
.home-hero .hh-sub{font-size:.88rem;color:var(--text-mid);margin:0 auto 20px;max-width:680px;line-height:1.6}
.csi-stats{display:flex;gap:24px;flex-wrap:wrap;justify-content:center}
.csi-stat{text-align:center;padding:12px 18px;background:var(--bg);border:1px solid var(--border);border-radius:8px}
.csi-stat .cs-val{font-size:1.3rem;font-weight:800;color:var(--charcoal)}
.csi-stat .cs-lab{font-size:.58rem;color:var(--text-light);margin-top:2px}

/* Hierarchy */
.hier{display:flex;align-items:center;gap:10px;margin-bottom:28px;flex-wrap:wrap}
.hier-box{background:var(--bg);border:1.5px solid var(--border);border-radius:8px;padding:10px 18px;text-align:center;transition:all .2s}
.hier-box:hover{border-color:var(--red-mid);box-shadow:var(--shadow)}
.hier-box .hb-n{font-size:.78rem;font-weight:700;color:var(--charcoal)}
.hier-box .hb-s{font-size:.56rem;color:var(--text-light);margin-top:2px}
.hier-box.active{border-color:var(--red);background:var(--red-light)}
.hier-arr{color:var(--red);font-size:1rem;font-weight:700}

/* Stock chart */
.stock-section{margin-bottom:32px}
.stock-embed{border:1px solid var(--border);border-radius:10px;overflow:hidden;background:var(--bg)}

/* BU Grid */
.bu-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:12px;margin-bottom:32px}
.bu-card{background:var(--bg);border:1.5px solid var(--border);border-radius:10px;padding:18px 20px;transition:all .25s;cursor:pointer;position:relative;display:flex;gap:14px;align-items:flex-start}
.bu-card:hover{border-color:var(--red-mid);box-shadow:0 4px 16px rgba(192,57,43,.08);transform:translateY(-2px)}
.bu-logo{width:48px;height:48px;border-radius:8px;background:var(--bg-off);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden}
.bu-logo img{width:36px;height:36px;object-fit:contain}
.bu-info{flex:1;min-width:0}
.bu-info .bi-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:3px}
.bu-info .bi-name{font-size:.85rem;font-weight:800;color:var(--charcoal)}
.bu-info .bi-acq{font-size:.5rem;font-weight:700;padding:2px 7px;border-radius:3px;background:var(--red-light);color:var(--red)}
.bu-info .bi-meta{font-size:.58rem;color:var(--text-light);margin-bottom:5px}
.bu-info .bi-desc{font-size:.68rem;color:var(--text-mid);line-height:1.45;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.bu-info .bi-tags{display:flex;flex-wrap:wrap;gap:3px;margin-top:6px}
.bu-info .bi-tag{font-size:.52rem;padding:2px 6px;border-radius:3px;background:var(--bg-off);border:1px solid var(--border);color:var(--text-mid)}
.bu-card .bc-arrow{position:absolute;bottom:12px;right:14px;font-size:.6rem;color:var(--red);font-weight:700}

/* ===== BU DETAIL PANEL ===== */
.bu-d-back{font-size:.7rem;color:var(--red);cursor:pointer;font-weight:600;margin-bottom:12px;display:inline-flex;align-items:center;gap:4px}
.bu-d-back:hover{text-decoration:underline}
.bu-d-top{display:flex;gap:20px;align-items:flex-start;margin-bottom:20px}
.bu-d-logo{width:64px;height:64px;border-radius:10px;background:var(--bg-off);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden}
.bu-d-logo img{width:48px;height:48px;object-fit:contain}
.bu-d-name{font-size:1.5rem;font-weight:800;color:var(--charcoal)}
.bu-d-meta{display:flex;gap:14px;font-size:.7rem;color:var(--text-light);margin-top:4px;flex-wrap:wrap}
.bu-d-desc{font-size:.85rem;color:var(--text-mid);line-height:1.65;max-width:800px;margin-bottom:16px}
.bu-d-link{display:inline-flex;align-items:center;gap:4px;font-size:.72rem;color:#fff;background:var(--red);font-weight:600;text-decoration:none;padding:7px 18px;border-radius:6px;transition:all .2s}
.bu-d-link:hover{background:#A93226}

.kf-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;margin:16px 0 20px}
.kf{background:var(--red-light);border:1px solid var(--red-mid);border-radius:8px;padding:10px;text-align:center}
.kf .kv{font-size:1rem;font-weight:800;color:var(--red)}
.kf .kl{font-size:.55rem;color:var(--text-light);margin-top:2px}

.prod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px;margin-top:10px}
.prod-card{background:var(--bg-off);border:1px solid var(--border);border-radius:8px;padding:14px}
.prod-card .pc-n{font-size:.78rem;font-weight:700;color:var(--charcoal);margin-bottom:4px}
.prod-card .pc-d{font-size:.68rem;color:var(--text-mid);line-height:1.5}

/* ===== VALUE CHAIN (connectivity map) ===== */
.vc-hint{font-size:.7rem;color:var(--text-light);text-align:center;margin-bottom:8px}.vc-hint b{color:var(--red)}
.conn-map{position:relative;min-width:1150px;height:650px;background:var(--bg-warm);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.conn-svg{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1}
.conn-svg path{transition:stroke-opacity .2s,stroke-width .2s}
.conn-map.has-focus .conn-svg path{stroke-opacity:.03!important}
.conn-map.has-focus .conn-svg path.lit{stroke-opacity:.6!important;stroke-width:2.5!important}
.col{position:absolute;display:flex;flex-direction:column;gap:5px;z-index:2}
.col-title{font-size:.54rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#fff;padding:4px 10px;border-radius:4px;text-align:center;margin-bottom:2px}
.cn{background:#fff;border:1.5px solid var(--border);border-radius:6px;padding:5px 10px;font-size:.64rem;font-weight:500;color:var(--text);cursor:pointer;transition:all .15s;position:relative;white-space:nowrap}
.cn:hover{border-color:var(--red);box-shadow:0 2px 8px rgba(192,57,43,.12);z-index:10}
.cn.j{background:var(--red-light);border-color:var(--red);font-weight:700;color:var(--red)}
.cn.j::before{content:'';position:absolute;left:-1.5px;top:-1.5px;bottom:-1.5px;width:3px;background:var(--red);border-radius:6px 0 0 6px}
.cn .cn-sub{display:block;font-size:.48rem;font-weight:600;color:var(--red);margin-top:1px}
.conn-map.has-focus .cn{opacity:.25}
.conn-map.has-focus .cn.lit{opacity:1!important;border-color:var(--red);box-shadow:0 2px 8px rgba(192,57,43,.12)}

/* Detail panel overlay */
.detail-panel{display:none;position:fixed;top:0;right:0;width:420px;height:100vh;background:var(--bg);border-left:2px solid var(--border);box-shadow:-4px 0 20px rgba(0,0,0,.1);z-index:9999;overflow-y:auto;padding:24px;animation:slideIn .25s ease}
@keyframes slideIn{from{transform:translateX(100%)}to{transform:translateX(0)}}
.detail-panel.open{display:block}
.dp-close{position:absolute;top:12px;right:14px;background:none;border:none;font-size:1.2rem;cursor:pointer;color:var(--text-light);padding:4px}
.dp-close:hover{color:var(--red)}
.dp-title{font-size:1.1rem;font-weight:800;color:var(--charcoal);margin-bottom:4px;padding-right:30px}
.dp-layer{font-size:.6rem;color:var(--text-light);text-transform:uppercase;letter-spacing:.04em;margin-bottom:10px}
.dp-desc{font-size:.78rem;color:var(--text-mid);line-height:1.6;margin-bottom:14px}
.dp-section-title{font-size:.68rem;font-weight:700;color:var(--charcoal);margin-bottom:6px;margin-top:14px;padding-top:10px;border-top:1px solid var(--border)}
.dp-conn-list{display:flex;flex-direction:column;gap:4px}
.dp-conn{font-size:.66rem;padding:4px 8px;border-radius:4px;background:var(--bg-off);border:1px solid var(--border);color:var(--text-mid);cursor:pointer}
.dp-conn:hover{border-color:var(--red);color:var(--red)}
.dp-conn.j{background:var(--red-light);border-color:var(--red-mid);color:var(--red);font-weight:600}
.dp-juniper{background:var(--red-light);border:1px solid var(--red-mid);border-radius:8px;padding:10px;margin-top:10px}
.dp-juniper .dpj-name{font-size:.72rem;font-weight:700;color:var(--red)}
.dp-juniper .dpj-desc{font-size:.64rem;color:var(--text-mid);margin-top:3px;line-height:1.4}

/* Flow & Grid tabs — keep compact */
.fl-row{display:flex;align-items:flex-start}
.fl-label{width:110px;min-width:110px;padding:10px 8px;font-size:.62rem;font-weight:700;color:#fff;text-align:center;display:flex;align-items:center;justify-content:center;line-height:1.2}
.fl-label.l1{background:var(--red)}.fl-label.l2{background:#8B3A3A}.fl-label.l3{background:#6B3030}.fl-label.l4{background:#4A2424}.fl-label.l5{background:var(--charcoal)}
.fl-body{flex:1;display:flex;flex-wrap:wrap;gap:8px;padding:12px 16px;background:var(--bg-off);border-bottom:1px solid var(--border);align-items:flex-start;min-height:60px}
.fgroup{border:1.5px solid var(--border);border-radius:8px;padding:8px 10px;background:#fff;display:flex;flex-wrap:wrap;gap:6px;position:relative;cursor:pointer;transition:all .2s}
.fgroup:hover{border-color:var(--red-mid);box-shadow:var(--shadow)}
.fgroup .fg-label{position:absolute;top:-8px;left:10px;background:#fff;padding:0 5px;font-size:.54rem;font-weight:700;color:var(--text-light);text-transform:uppercase;letter-spacing:.03em}
.fbox{background:#fff;border:1.5px solid var(--border);border-radius:7px;padding:6px 10px;min-width:90px;max-width:200px;cursor:pointer;transition:all .2s}
.fbox:hover{border-color:var(--red-mid);box-shadow:var(--shadow);transform:translateY(-1px)}
.fbox .fx-t{font-size:.66rem;font-weight:700;color:var(--charcoal)}
.fbox .fx-c{font-size:.52rem;color:var(--red);font-weight:600;margin-top:1px}
.fbox.fj{border-color:var(--red);background:var(--red-light)}
.fbox .fx-b{display:inline-block;font-size:.48rem;font-weight:700;padding:1px 4px;border-radius:3px;margin-left:3px}
.fx-b.core{background:var(--green);color:#fff}.fx-b.current{background:#00A676CC;color:#fff}.fx-b.partial{background:var(--yellow);color:#fff}.fx-b.gap{background:#CCC;color:#fff}
.flow-arrow-row{display:flex;align-items:center;justify-content:center;height:24px;position:relative}
.flow-arrow-row::before{content:'';position:absolute;left:15%;right:15%;top:50%;height:1px;background:var(--border)}
.flow-arrow-row span{background:#fff;padding:0 12px;font-size:.56rem;color:var(--red);font-weight:700;z-index:1}
.traveler-box{display:flex;align-items:center;justify-content:center;gap:8px;padding:12px 24px;background:var(--bg-off);border:2px solid var(--border);border-radius:10px;font-size:.82rem;font-weight:700;color:var(--charcoal);margin-top:4px}

/* Grid */
.gv-sec{margin-bottom:24px;animation:gvIn .4s ease both}
@keyframes gvIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.gv-hdr{display:flex;align-items:center;gap:9px;margin-bottom:8px;padding-bottom:6px;border-bottom:2px solid var(--border)}
.gv-num{width:24px;height:24px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:.64rem;font-weight:800;color:#fff;flex-shrink:0}
.gv-ttl{font-size:.95rem;font-weight:700;color:var(--charcoal)}
.gv-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:9px}
.gv-card{background:var(--bg);border:1.5px solid var(--border);border-radius:7px;padding:12px 14px;transition:all .2s;cursor:pointer}
.gv-card:hover{border-color:var(--red-mid);box-shadow:var(--shadow)}
.gv-card.hj{border-left:3px solid var(--red)}
.gv-card .gc-t{font-size:.74rem;font-weight:700;color:var(--charcoal);margin-bottom:5px}
.gv-card .gc-r{display:flex;align-items:center;justify-content:space-between;padding:2px 0;border-bottom:1px solid #EDEEF2;font-size:.66rem}
.gv-card .gc-r:last-child{border-bottom:none}
.gc-n{color:var(--text)}.gc-c{font-size:.56rem;color:var(--red);font-weight:600}
.sb{font-size:.5rem;font-weight:700;padding:1px 5px;border-radius:3px;white-space:nowrap}
.sb.core{background:var(--green-bg);color:var(--green);border:1px solid #B5E4D0}.sb.partial{background:var(--yellow-bg);color:var(--yellow);border:1px solid #F0D68A}.sb.gap{background:#F5F0F0;color:#999;border:1px dashed #D8CCCC}.sb.future{background:var(--purple-bg);color:var(--purple);border:1px solid #C5B8E8}

.ftr{display:flex;justify-content:space-between;padding:14px 48px;max-width:1600px;margin:0 auto;border-top:1px solid var(--border);font-size:.58rem;color:var(--text-light)}
@media(max-width:900px){.view{padding:16px 16px 32px}.home-hero{padding:24px}.home-hero h1{font-size:1.4rem}.bu-grid{grid-template-columns:1fr}.detail-panel{width:100%}}
</style>
</head>

function openNodePanel(nodeId){
  const info=NODE_INFO[nodeId];
  if(!info){closePanel();return}
  let h=`<div class="dp-layer">${info.layer}</div><div class="dp-title">${info.title}</div><div class="dp-desc">${info.desc}</div>`;
  if(info.juniper){
    h+=`<div class="dp-juniper"><div class="dpj-name">Juniper: ${info.juniper.status}${info.juniper.bu?' — '+info.juniper.bu:''}</div><div class="dpj-desc">${info.juniper.note}</div></div>`;
  }
  if(info.conns&&info.conns.length){
    h+=`<div class="dp-section-title">Connected To</div><div class="dp-conn-list">`;
    info.conns.forEach(c=>{const isJ=c.includes('Juniper')||c.includes('Connectivity')||c.includes('Booking Engine')||c.includes('Dynamic')||c.includes('Lleego')||c.includes('IST')||c.includes('Hotetec')||c.includes('CRM');h+=`<div class="dp-conn${isJ?' j':''}">${c}</div>`});
    h+=`</div>`;
  }
  openPanel(h);
}

function showBU(buId){
  const bu=BUS.find(b=>b.id===buId);if(!bu)return;
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('on'));
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  buDV.classList.add('active');
  let h=`<div class="bu-d-back" onclick="showTab('home')">← Back to Portfolio</div>`;
  h+=`<div class="bu-d-top"><div class="bu-d-logo"><img src="https://www.google.com/s2/favicons?domain=${bu.logo}&sz=64" onerror="this.style.display='none'"></div><div><div class="bu-d-name">${bu.name}</div><div class="bu-d-meta"><span>📍 ${bu.hq}</span><span>Founded ${bu.f}</span><span>Acquired ${bu.a}</span>${bu.gm?`<span>GM: ${bu.gm}</span>`:''}</div></div></div>`;
  h+=`<div class="bu-d-desc">${bu.desc}</div>`;
  h+=`<a class="bu-d-link" href="${bu.url}" target="_blank" rel="noopener">Visit Website →</a>`;
  if(bu.facts){h+=`<div class="kf-grid">`;bu.facts.forEach(f=>{h+=`<div class="kf"><div class="kv">${f.v}</div><div class="kl">${f.l}</div></div>`});h+=`</div>`}
  h+=`<div class="sec-title" style="font-size:1rem;margin-top:20px">Products & Solutions</div><div class="sec-bar"></div><div class="prod-grid">`;
  bu.products.forEach(p=>{h+=`<div class="prod-card"><div class="pc-n">${p.n}</div><div class="pc-d">${p.d}</div></div>`});
  h+=`</div>`;
  buDV.innerHTML=h;
}

{id:'supply',title:'Supply',color:'var(--red)',x:20,nodes:[{id:'hotels',l:'🏨 Hotels'},{id:'airlines',l:'✈️ Airlines'},{id:'cruise',l:'🚢 Cruise'},{id:'rail',l:'🚄 Rail'},{id:'car',l:'🚗 Car Rental'},{id:'activities',l:'🎯 Activities'},{id:'vr',l:'🏡 Vacation Rental'}]},
{id:'core',title:'Core Systems',color:'#8B3A3A',x:175,nodes:[{id:'pms',l:'PMS'},{id:'crs',l:'CRS',j:1,s:'Hotetec'},{id:'rms',l:'RMS'},{id:'pss',l:'PSS (Airline)'},{id:'cruise_res',l:'Cruise Res.',j:1,s:'IST'},{id:'rail_res',l:'Rail Res.'},{id:'vr_pms',l:'VR PMS'}]},
{id:'dist',title:'Distribution',color:'#6B3030',x:345,nodes:[{id:'conn_hub',l:'Connectivity Hub',j:1,s:'Juniper TT'},{id:'gds',l:'GDS'},{id:'ch_mgr',l:'Channel Mgr',s:'Hotetec'},{id:'air_agg',l:'Air Aggregator',j:1,s:'Lleego'},{id:'bedbank',l:'Bedbank',j:1,s:'DOME'},{id:'content',l:'Content Mapping',j:1,s:'Vervotech'},{id:'ndc',l:'NDC / LCC'},{id:'train_agg',l:'Train Agg.'},{id:'car_agg',l:'Car Rental Agg.'}]},
{id:'pkg',title:'Packaging & Retail',color:'#4A2424',x:535,nodes:[{id:'booking',l:'Booking Engine',j:1,s:'Juniper TT +4'},{id:'dyn_pkg',l:'Dynamic Pkg',j:1,s:'Peakwork'},{id:'ancillary',l:'Ancillary Mgmt',j:1,s:'Juniper TT'},{id:'to_sys',l:'Tour Op. System'},{id:'agency',l:'Agency Back-Office'},{id:'dmc_sw',l:'DMC Software',j:1,s:'Dome'},{id:'dest_os',l:'Destination OS',j:1,s:'Alturos'},{id:'crm',l:'Travel CRM',j:1,s:'Inspiretec'}]},
{id:'b2c',title:'B2C Distribution',color:'var(--charcoal)',x:730,nodes:[{id:'ota',l:'OTA Platforms'},{id:'meta',l:'Metasearch'},{id:'ta',l:'Travel Agencies'},{id:'tmc',l:'Corporate TMCs'},{id:'social',l:'Social Commerce'},{id:'ecom',l:'E-commerce'},{id:'direct',l:'Direct (Hotel Web)'}]},
{id:'end',title:'Traveler',color:'var(--dark)',x:910,nodes:[{id:'leisure',l:'🧳 Leisure'},{id:'business',l:'💼 Business'},{id:'group',l:'👥 Group/MICE'}]},
];
const red='#C0392B',gray='#C8C4BC';
const EDGES=[['hotels','pms',gray],['hotels','crs',red],['hotels','rms',gray],['airlines','pss',gray],['cruise','cruise_res',red],['rail','rail_res',gray],['vr','vr_pms',gray],['car','car_agg',gray],['activities','dmc_sw',red],['pms','ch_mgr',gray],['pms','conn_hub',red],['crs','ch_mgr',red],['crs','conn_hub',red],['crs','gds',gray],['rms','conn_hub',gray],['pss','gds',gray],['pss','air_agg',red],['pss','ndc',gray],['cruise_res','conn_hub',red],['cruise_res','gds',gray],['rail_res','train_agg',gray],['rail_res','conn_hub',red],['vr_pms','ch_mgr',gray],['vr_pms','conn_hub',red],['conn_hub','booking',red],['conn_hub','dyn_pkg',red],['conn_hub','ancillary',red],['conn_hub','to_sys',gray],['conn_hub','agency',gray],['gds','booking',gray],['gds','to_sys',gray],['ch_mgr','ota',gray],['ch_mgr','meta',gray],['air_agg','booking',red],['air_agg','dyn_pkg',red],['bedbank','booking',red],['bedbank','ota',gray],['content','conn_hub',red],['content','booking',red],['ndc','booking',gray],['ndc','air_agg',gray],['train_agg','booking',gray],['car_agg','booking',gray],['booking','ota',gray],['booking','ta',gray],['booking','tmc',gray],['booking','direct',red],['booking','ecom',gray],['dyn_pkg','ota',gray],['dyn_pkg','ta',gray],['dyn_pkg','booking',red],['ancillary','booking',red],['to_sys','ta',gray],['agency','ta',gray],['dmc_sw','to_sys',red],['dmc_sw','booking',red],['dest_os','direct',red],['dest_os','social',gray],['crm','ta',red],['crm','direct',red],['crm','booking',red],['ota','leisure',gray],['ota','business',gray],['meta','leisure',gray],['ta','leisure',gray],['ta','group',gray],['tmc','business',gray],['social','leisure',gray],['ecom','leisure',gray],['direct','leisure',red],['direct','business',gray]];

const map=document.createElement('div');map.className='conn-map';
const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');svg.classList.add('conn-svg');svg.setAttribute('width','100%');svg.setAttribute('height','100%');map.appendChild(svg);
const nEls={};
COLS.forEach(col=>{const cEl=document.createElement('div');cEl.className='col';cEl.style.left=col.x+'px';cEl.style.top='10px';
const t=document.createElement('div');t.className='col-title';t.style.background=col.color;t.textContent=col.title;cEl.appendChild(t);
col.nodes.forEach(nd=>{const el=document.createElement('div');el.className=`cn${nd.j?' j':''}`;el.dataset.id=nd.id;let ih=nd.l;if(nd.s)ih+=`<span class="cn-sub">${nd.s}</span>`;el.innerHTML=ih;cEl.appendChild(el);nEls[nd.id]=el});
map.appendChild(cEl)});w.appendChild(map);

requestAnimationFrame(()=>{
const mr=map.getBoundingClientRect();const nP={};
Object.entries(nEls).forEach(([id,el])=>{const r=el.getBoundingClientRect();nP[id]={l:r.left-mr.left,r:r.left-mr.left+r.width,cy:r.top-mr.top+r.height/2}});
svg.setAttribute('viewBox',`0 0 ${map.offsetWidth} ${map.offsetHeight}`);
const eEls=[];
EDGES.forEach(([f,t,c])=>{const a=nP[f],b=nP[t];if(!a||!b)return;const x1=a.r,y1=a.cy,x2=b.l,y2=b.cy,cpx=(x1+x2)/2;
const p=document.createElementNS('http://www.w3.org/2000/svg','path');p.setAttribute('d',`M${x1},${y1} C${cpx},${y1} ${cpx},${y2} ${x2},${y2}`);p.setAttribute('fill','none');p.setAttribute('stroke',c);p.setAttribute('stroke-width',c===red?'1.8':'1');p.setAttribute('stroke-opacity',c===red?'.3':'.1');p.dataset.from=f;p.dataset.to=t;svg.appendChild(p);eEls.push(p)});

let active=null;
function hl(nid){
  if(active===nid){active=null;map.classList.remove('has-focus');document.querySelectorAll('.cn').forEach(n=>n.classList.remove('lit'));eEls.forEach(e=>e.classList.remove('lit'));closePanel();return}
  active=nid;map.classList.add('has-focus');document.querySelectorAll('.cn').forEach(n=>n.classList.remove('lit'));eEls.forEach(e=>e.classList.remove('lit'));
  const conn=new Set([nid]);eEls.forEach(e=>{if(e.dataset.from===nid||e.dataset.to===nid){e.classList.add('lit');conn.add(e.dataset.from);conn.add(e.dataset.to)}});
  conn.forEach(id=>{if(nEls[id])nEls[id].classList.add('lit')});
  openNodePanel(nid);
}
Object.entries(nEls).forEach(([id,el])=>{el.addEventListener('click',()=>hl(id))});
map.addEventListener('click',e=>{if(!e.target.closest('.cn')&&active){active=null;map.classList.remove('has-focus');document.querySelectorAll('.cn').forEach(n=>n.classList.remove('lit'));eEls.forEach(e=>e.classList.remove('lit'));closePanel()}});
})}

// ====== FLOW ======
const FL=[{label:"Supply",groups:[{t:"Accommodation",items:["Hotels","Clubs","Camping","VR"]},{t:"Transport",items:["Air","Rail","Car"]},{t:"Other",items:["Cruise","Activities"]}]},{label:"Core",groups:[{t:"Accomm.",items:[{t:"PMS",b:"gap"},{t:"CRS",b:"partial",c:"Hotetec"},{t:"RMS",b:"gap"}]},{t:"Transport",items:[{t:"PSS"},{t:"Airline Res."}]},{t:"Cruise",j:1,items:[{t:"Cruise Res.",b:"current",c:"IST"}]}]},{label:"Distribution",groups:[{t:"Aggregators",items:[{t:"OTAs"},{t:"Bedbanks",b:"partial",c:"DOME"}]},{t:"Tech Hub",j:1,items:[{t:"Connectivity Hub",b:"core",c:"Juniper TT"},{t:"GDS"},{t:"Content Map",b:"current",c:"Vervotech"}]},{t:"Transport Agg.",j:1,items:[{t:"Air Agg.",b:"current",c:"Lleego"},{t:"NDC"},{t:"Train Agg."}]}]},{label:"Retail",groups:[{t:"Packaging",j:1,items:[{t:"Dynamic Pkg",b:"core",c:"Peakwork"},{t:"Ancillary",b:"partial",c:"Juniper TT"}]},{t:"Booking",j:1,items:[{t:"Booking Engine",b:"current",c:"Juniper TT +4"},{t:"B2B Portal"}]},{t:"TA/TO",items:[{t:"Tour Op."},{t:"Agency"},{t:"DMC Sw.",b:"current",c:"Dome"}]}]},{label:"B2C",groups:[{t:"Online",items:[{t:"OTAs"},{t:"Metasearch"},{t:"Social"}]},{t:"Agencies",items:[{t:"TAs"},{t:"TMCs"}]}]}];
let flB=false;
function buildFlow(){flB=true;const w=document.getElementById('view-flow');w.innerHTML='';
FL.forEach((layer,li)=>{if(li>0){const a=document.createElement('div');a.className='flow-arrow-row';a.innerHTML=`<span>▼</span>`;w.appendChild(a)}
const row=document.createElement('div');row.className='fl-row';const lb=document.createElement('div');lb.className=`fl-label l${Math.min(li+1,5)}`;lb.textContent=layer.label;row.appendChild(lb);
const bd=document.createElement('div');bd.className='fl-body';
layer.groups.forEach(g=>{const ge=document.createElement('div');ge.className='fgroup';ge.innerHTML=`<span class="fg-label">${g.t}</span>`;if(g.j)ge.style.borderColor='var(--red)';
g.items.forEach(it=>{const b=document.createElement('div');if(typeof it==='string'){b.className='fbox';b.innerHTML=`<div class="fx-t">${it}</div>`}else{const isJ=it.b&&it.b!=='gap';b.className=`fbox${isJ?' fj':''}`;let bh=`<div class="fx-t">${it.t}${it.b?` <span class="fx-b ${it.b}">${it.b.slice(0,4)}</span>`:''}</div>`;if(it.c)bh+=`<div class="fx-c">${it.c}</div>`;b.innerHTML=bh}
b.style.cursor='pointer';b.onclick=()=>{const nid=Object.keys(NODE_INFO).find(k=>NODE_INFO[k].title.toLowerCase().includes((it.t||it).toLowerCase().slice(0,6)));if(nid)openNodePanel(nid)};
ge.appendChild(b)});bd.appendChild(ge)});
row.appendChild(bd);w.appendChild(row)});
const af=document.createElement('div');af.className='flow-arrow-row';af.innerHTML='<span>▼</span>';w.appendChild(af);
const tv=document.createElement('div');tv.className='traveler-box';tv.textContent='🧳 Traveler';w.appendChild(tv)}

// ====== GRID ======
const GD=[{id:1,n:"Core Reservation & Inventory",c:"#C0392B",groups:[{l:"Accommodation",items:[{n:"PMS",j:"gap"},{n:"CRS",j:"partial",c:"Hotetec"},{n:"RMS",j:"gap"},{n:"Guest Experience"},{n:"Hotel Ops"}]},{l:"Airlines",items:[{n:"PSS",j:"gap"},{n:"Airline Res."},{n:"DCS"}]},{l:"Cruise",items:[{n:"Cruise Res.",j:"current",c:"IST"}]},{l:"VR",items:[{n:"VR PMS"},{n:"Smart Lock"}]}]},{id:2,n:"Distribution & Connectivity",c:"#8B3A3A",groups:[{l:"Core",items:[{n:"GDS"},{n:"Connectivity Hub",j:"core",c:"Juniper TT"},{n:"XML/API"},{n:"Content Map",j:"current",c:"Vervotech"},{n:"Channel Mgr",j:"gap",c:"Hotetec"}]},{l:"Aggregation",items:[{n:"Air Agg.",j:"current",c:"Lleego"},{n:"Bedbank",j:"partial",c:"DOME"},{n:"NDC/LCC"},{n:"Train Agg."}]}]},{id:3,n:"Retail & Commerce",c:"#6B3030",groups:[{l:"Sales",items:[{n:"Booking Engine",j:"current",c:"Juniper TT +4"},{n:"OTA Platform",j:"gap"},{n:"B2B Portal"}]},{l:"Packaging",items:[{n:"Dynamic Pkg",j:"core",c:"Peakwork"},{n:"Ancillary",j:"partial",c:"Juniper TT"},{n:"Offer Mgmt"}]},{l:"TA/TO",items:[{n:"Tour Op."},{n:"Agency"},{n:"DMC Sw.",j:"current",c:"Dome"}]}]},{id:4,n:"Payments & Fintech",c:"#4A2424",groups:[{l:"Payments",items:[{n:"Gateway",j:"gap"},{n:"PSP",j:"gap"},{n:"VCC",j:"partial"},{n:"Fraud",j:"gap"},{n:"Insurance"}]}]},{id:5,n:"Customer Lifecycle",c:"#3A3A3A",groups:[{l:"CRM",items:[{n:"Travel CRM",j:"current",c:"Inspiretec"},{n:"Support",j:"partial",c:"Inspiretec"},{n:"Loyalty",j:"gap"},{n:"CDP",j:"emerging"},{n:"Personalization",j:"future"}]}]},{id:6,n:"Data & Intelligence",c:"#2C2C2C",groups:[{l:"Data",items:[{n:"Data Warehouse",j:"core",c:"Juniper TT"},{n:"BI",j:"current",c:"Juniper TT"},{n:"AI Opt.",j:"future"},{n:"Reporting"}]}]},{id:7,n:"Ops & Compliance",c:"#1A1A1A",groups:[{l:"Ops",items:[{n:"Check-in"},{n:"Trip Mgmt"},{n:"Disruption"}]},{l:"Digital",items:[{n:"CMS"},{n:"API Mgmt"},{n:"Mobile"}]},{l:"Compliance",items:[{n:"KYC"},{n:"Regulatory"}]}]}];

function badge(j){const m={core:['Core','core'],current:['Current','core'],partial:['Partial','partial'],gap:['Gap','gap'],emerging:['Emerging','future'],future:['Future','future']};const v=m[j];return v?`<span class="sb ${v[1]}">${v[0]}</span>`:''}
let grB=false;
function buildGrid(){grB=true;const w=document.getElementById('view-grid');
GD.forEach((l,li)=>{const s=document.createElement('div');s.className='gv-sec';s.style.animationDelay=(li*.04)+'s';
s.innerHTML=`<div class="gv-hdr"><div class="gv-num" style="background:${l.c}">${l.id}</div><div class="gv-ttl">${l.n}</div></div>`;
const g=document.createElement('div');g.className='gv-grid';
l.groups.forEach(gr=>{const cd=document.createElement('div');const hj=gr.items.some(i=>i.j&&i.j!=='gap');cd.className=`gv-card${hj?' hj':''}`;
let h=`<div class="gc-t">${gr.l}</div>`;
gr.items.forEach(it=>{h+=`<div class="gc-r"><span class="gc-n">${it.n}</span><div style="display:flex;gap:3px;align-items:center">${it.c?`<span class="gc-c">${it.c.split(',')[0]}</span>`:''}${it.j?badge(it.j):''}</div></div>`});
cd.innerHTML=h;
cd.style.cursor='pointer';
cd.onclick=()=>{const firstJ=gr.items.find(i=>i.j&&i.j!=='gap');if(firstJ){const nid=Object.keys(NODE_INFO).find(k=>NODE_INFO[k].title.toLowerCase().includes(firstJ.n.toLowerCase().slice(0,5)));if(nid)openNodePanel(nid)}};
g.appendChild(cd)});
s.appendChild(g);w.appendChild(s)})}
</script>
