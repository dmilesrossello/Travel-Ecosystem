<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Juniper Group — Travel & Hospitality Software Companies</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--red:#C0392B;--red-dark:#A93226;--red-light:#FDECEA;--red-mid:#E6A8A2;--charcoal:#2C2C2C;--charcoal-deep:#1F1F1F;--dark:#1A1A1A;--text:#2C2C2C;--text-mid:#555;--text-light:#888;--bg:#FFF;--bg-off:#F5F5F3;--bg-warm:#FAF8F5;--border:#E5E2DD;--teal:#009B9B;--teal-light:#E6F5F5;--teal-mid:#B3E0E0;--green:#00A676;--green-bg:#E8F7F1;--yellow:#D4920B;--yellow-bg:#FFF8E8;--purple:#6B4FBB;--purple-bg:#F0ECF9;--shadow:0 2px 8px rgba(0,0,0,.06)}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden}

/* NAV — brand bar styled after juniper-group.com */
.topbar{background:var(--charcoal-deep);padding:14px 40px;display:flex;align-items:center;gap:20px;border-bottom:1px solid rgba(255,255,255,.06)}
.topbar .tb-logo{height:34px;display:block}
.topbar .tb-divider{width:1px;height:22px;background:rgba(255,255,255,.14)}
.topbar img{height:28px}
.topbar .tb-title{color:#fff;font-size:.78rem;font-weight:600;letter-spacing:.02em;text-transform:uppercase}
.topbar .tb-sub{color:rgba(255,255,255,.45);font-size:.62rem;margin-left:6px;font-weight:500;letter-spacing:.04em}
.topbar .tb-spacer{flex:1}
.topbar .tb-link{color:rgba(255,255,255,.7);font-size:.7rem;font-weight:600;text-decoration:none;letter-spacing:.05em;text-transform:uppercase;transition:color .2s}
.topbar .tb-link:hover{color:#fff}
.nav{display:flex;gap:0;padding:0 32px;max-width:1600px;margin:0 auto;border-bottom:2px solid var(--border);overflow-x:auto;background:var(--bg)}
.nav-btn{background:none;border:none;border-bottom:3px solid transparent;color:var(--text-light);padding:11px 16px;font-family:inherit;font-size:.7rem;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap}
.nav-btn:hover{color:var(--red)}
.nav-btn.on{color:var(--red);border-bottom-color:var(--red)}

/* VIEWS */
.view{display:none;max-width:1600px;margin:0 auto;padding:24px 48px 48px}
.view.active{display:block}

/* ===== SHARED SECTION STYLES ===== */
.sec-title{font-size:1.8rem;font-weight:800;color:var(--charcoal);margin-bottom:6px;line-height:1.15}
.sec-bar{width:60px;height:4px;background:var(--red);border-radius:2px;margin-bottom:16px}
.sec-sub{font-size:.82rem;color:var(--text-mid);line-height:1.6;max-width:700px}
.dot-grid{position:absolute;display:grid;grid-template-columns:repeat(4,6px);gap:8px;opacity:.15}
.dot-grid span{width:6px;height:6px;border-radius:50%;background:var(--charcoal)}

/* ===== HOME TAB — cinematic video hero (juniper-group.com style) ===== */
.home-hero{position:relative;width:100vw;margin-left:calc(-50vw + 50%);margin-top:-24px;margin-bottom:36px;padding:104px 48px 92px;overflow:hidden;text-align:left;min-height:560px;display:flex;flex-direction:column;justify-content:center;background:linear-gradient(135deg,#1a1a1a 0%,#2c2c2c 100%)}
.hh-video-wrap{position:absolute;inset:0;z-index:0;overflow:hidden;background:#0f0f0f}
.hh-video{position:absolute;top:50%;left:50%;min-width:100%;min-height:100%;width:auto;height:auto;transform:translate(-50%,-50%);object-fit:cover;opacity:0;transition:opacity 1.2s ease-in-out}
.hh-video.active{opacity:1}
.hh-video-poster{position:absolute;inset:0;background-size:cover;background-position:center;background-image:url('https://juniper-group.com/wp-content/uploads/2024/08/AdobeStock_701144251-1-scaled.jpeg');filter:brightness(.55)}
.hh-overlay{position:absolute;inset:0;z-index:1;background:linear-gradient(180deg,rgba(15,15,15,.55) 0%,rgba(20,20,20,.65) 60%,rgba(15,15,15,.78) 100%)}
.hh-overlay::after{content:"";position:absolute;inset:0;background:radial-gradient(ellipse at 30% 50%,rgba(192,57,43,.18) 0%,transparent 55%)}
.hh-content{position:relative;z-index:2;max-width:1600px;width:100%;margin:0 auto;padding:0 16px}
.home-hero .hh-tag{font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.22em;color:#fff;margin-bottom:18px;opacity:.8}
.home-hero .hh-tag::before{content:"";display:inline-block;width:28px;height:2px;background:var(--red);vertical-align:middle;margin-right:12px;margin-bottom:3px}
.home-hero h1{font-size:3.6rem;font-weight:800;color:#fff;line-height:1.05;margin-bottom:20px;letter-spacing:-.02em;max-width:880px}
.home-hero h1 .hl{color:#fff;position:relative;display:inline-block}
.home-hero h1 .hl::after{content:"";position:absolute;left:0;right:0;bottom:4px;height:10px;background:var(--red);opacity:.75;z-index:-1;border-radius:2px}
.home-hero .hh-sub{font-size:1.02rem;color:rgba(255,255,255,.88);margin:0 0 30px;max-width:640px;line-height:1.65;font-weight:400}
.hh-cta-row{display:flex;gap:14px;align-items:center;flex-wrap:wrap;margin-bottom:36px}
.hh-cta{display:inline-flex;align-items:center;gap:8px;background:var(--red);color:#fff;font-weight:700;font-size:.78rem;padding:14px 28px;border-radius:4px;text-decoration:none;letter-spacing:.04em;text-transform:uppercase;transition:all .25s;box-shadow:0 4px 20px rgba(192,57,43,.35)}
.hh-cta:hover{background:var(--red-dark);transform:translateY(-1px);box-shadow:0 6px 24px rgba(192,57,43,.5)}
.hh-cta.ghost{background:transparent;border:1.5px solid rgba(255,255,255,.35);box-shadow:none;color:#fff}
.hh-cta.ghost:hover{background:rgba(255,255,255,.08);border-color:#fff}
.hh-video-dots{position:absolute;bottom:22px;right:40px;z-index:3;display:flex;gap:7px}
.hh-video-dots span{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.35);cursor:pointer;transition:all .3s}
.hh-video-dots span.on{background:var(--red);width:22px;border-radius:4px}
.csi-stats{display:flex;gap:0;flex-wrap:wrap;justify-content:flex-start;border-top:1px solid rgba(255,255,255,.14);padding-top:22px;max-width:1100px}
.csi-stat{text-align:left;padding:4px 28px 4px 0;background:transparent;border:none;border-right:1px solid rgba(255,255,255,.14);margin-right:28px}
.csi-stat:last-child{border-right:none;margin-right:0}
.csi-stat .cs-val{font-size:1.45rem;font-weight:800;color:#fff;letter-spacing:-.01em}
.csi-stat .cs-lab{font-size:.58rem;color:rgba(255,255,255,.6);margin-top:3px;text-transform:uppercase;letter-spacing:.08em;font-weight:600}

/* Hierarchy */
.hier{display:flex;align-items:center;gap:10px;margin-bottom:28px;flex-wrap:wrap}
.hier-box{background:var(--bg);border:1.5px solid var(--border);border-radius:8px;padding:10px 18px;text-align:center;transition:all .2s}
.hier-box:hover{border-color:var(--red-mid);box-shadow:var(--shadow)}
.hier-box .hb-n{font-size:.78rem;font-weight:700;color:var(--charcoal)}
.hier-box .hb-s{font-size:.56rem;color:var(--text-light);margin-top:2px}
.hier-box.active{border-color:var(--red);background:var(--red-light)}
.hier-arr{color:var(--red);font-size:1rem;font-weight:700}

/* Stock chart */
.stock-section{margin-bottom:32px}
.stock-embed{border:1px solid var(--border);border-radius:10px;overflow:hidden;background:var(--bg)}

/* BU Grid */
.bu-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:12px;margin-bottom:32px}
.bu-card{background:var(--bg);border:1.5px solid var(--border);border-radius:10px;padding:18px 20px;transition:all .25s;cursor:pointer;position:relative;display:flex;gap:14px;align-items:flex-start}
.bu-card:hover{border-color:var(--red-mid);box-shadow:0 4px 16px rgba(192,57,43,.08);transform:translateY(-2px)}
.bu-logo{width:120px;height:60px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden}
.bu-logo img{max-width:120px;max-height:60px;object-fit:contain}
.bu-info{flex:1;min-width:0}
.bu-info .bi-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:3px}
.bu-info .bi-name{font-size:.85rem;font-weight:800;color:var(--charcoal)}
.bu-info .bi-acq{font-size:.5rem;font-weight:700;padding:2px 7px;border-radius:3px;background:var(--red-light);color:var(--red);flex-shrink:0;white-space:nowrap}
.bu-info .bi-meta{font-size:.58rem;color:var(--text-light);margin-bottom:5px}
.bu-info .bi-desc{font-size:.68rem;color:var(--text-mid);line-height:1.45;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.bu-info .bi-tags{display:flex;flex-wrap:wrap;gap:3px;margin-top:6px}
.bu-info .bi-tag{font-size:.52rem;padding:2px 6px;border-radius:3px;background:var(--bg-off);border:1px solid var(--border);color:var(--text-mid)}
.bu-card .bc-arrow{position:absolute;bottom:12px;right:14px;font-size:.6rem;color:var(--red);font-weight:700}

/* ===== BU DETAIL PANEL ===== */
.bu-d-back{font-size:.7rem;color:var(--red);cursor:pointer;font-weight:600;margin-bottom:12px;display:inline-flex;align-items:center;gap:4px}
.bu-d-back:hover{text-decoration:underline}
.bu-d-top{display:flex;gap:20px;align-items:flex-start;margin-bottom:20px}
.bu-d-logo{width:80px;height:80px;border-radius:10px;background:var(--bg-off);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden}
.bu-d-logo img{width:64px;height:64px;object-fit:contain}
.bu-d-name{font-size:1.5rem;font-weight:800;color:var(--charcoal)}
.bu-d-meta{display:flex;gap:14px;font-size:.7rem;color:var(--text-light);margin-top:4px;flex-wrap:wrap}
.bu-d-desc{font-size:.85rem;color:var(--text-mid);line-height:1.65;max-width:800px;margin-bottom:16px}
.bu-d-link{display:inline-flex;align-items:center;gap:4px;font-size:.72rem;color:#fff;background:var(--red);font-weight:600;text-decoration:none;padding:7px 18px;border-radius:6px;transition:all .2s}
.bu-d-link:hover{background:#A93226}

.kf-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;margin:16px 0 20px}
.kf{background:var(--red-light);border:1px solid var(--red-mid);border-radius:8px;padding:10px;text-align:center}
.kf .kv{font-size:1rem;font-weight:800;color:var(--red)}
.kf .kl{font-size:.55rem;color:var(--text-light);margin-top:2px}

.prod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px;margin-top:10px}
.prod-card{background:var(--bg-off);border:1px solid var(--border);border-radius:8px;padding:14px}
.prod-card .pc-n{font-size:.78rem;font-weight:700;color:var(--charcoal);margin-bottom:4px}
.prod-card .pc-d{font-size:.68rem;color:var(--text-mid);line-height:1.5}

/* ===== CONNECTIVITY — progressive reveal ===== */
#vc-view{padding:12px 32px 40px;max-width:1600px;margin:0 auto}
.vc-hint{font-size:.75rem;color:var(--text-light);text-align:center;margin-bottom:16px}.vc-hint b{color:var(--red)}

.conn-flow{display:flex;gap:0;align-items:flex-start;min-height:500px;overflow-x:auto;padding-bottom:16px}

.cf-col{display:flex;flex-direction:column;align-items:center;gap:0;min-width:180px;flex-shrink:0;animation:cfIn .35s ease both}
@keyframes cfIn{from{opacity:0;transform:translateX(-20px)}to{opacity:1;transform:translateX(0)}}

.cf-header{font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#fff;padding:6px 18px;border-radius:6px;margin-bottom:10px;text-align:center}

.cf-nodes{display:flex;flex-direction:column;gap:6px;width:100%;padding:0 8px}

.cf-arrow{display:flex;align-items:center;justify-content:center;width:20px;flex-shrink:0;align-self:stretch}
.cf-arrow::after{content:'';width:1px;height:60%;background:var(--border);display:block}

.cn{background:#fff;border:2px solid var(--border);border-radius:8px;padding:10px 14px;font-size:.76rem;font-weight:500;color:var(--text);cursor:pointer;transition:all .2s;position:relative;text-align:left}
.cn:hover{border-color:var(--red);box-shadow:0 3px 12px rgba(192,57,43,.12);transform:translateY(-2px);z-index:10}
.cn.selected{border-color:var(--red);background:var(--red-light);box-shadow:0 3px 12px rgba(192,57,43,.15)}
.cn.j{background:var(--red-light);border-color:var(--red);font-weight:700;color:var(--red)}
.cn.j::before{content:'';position:absolute;left:-2px;top:-2px;bottom:-2px;width:4px;background:var(--red);border-radius:8px 0 0 8px}
.cn .cn-sub{display:block;font-size:.58rem;font-weight:600;color:var(--red);margin-top:2px}
.cn .cn-desc{display:block;font-size:.56rem;font-weight:400;color:var(--text-light);margin-top:3px;line-height:1.35;white-space:normal}
.cn.dimmed{opacity:.25;pointer-events:none}

/* Detail panel overlay */
.detail-panel{display:none;position:fixed;top:0;right:0;width:420px;height:100vh;background:var(--bg);border-left:2px solid var(--border);box-shadow:-4px 0 20px rgba(0,0,0,.1);z-index:9999;overflow-y:auto;padding:24px;animation:slideIn .25s ease}
@keyframes slideIn{from{transform:translateX(100%)}to{transform:translateX(0)}}
.detail-panel.open{display:block}
.dp-close{position:absolute;top:12px;right:14px;background:none;border:none;font-size:1.2rem;cursor:pointer;color:var(--text-light);padding:4px}
.dp-close:hover{color:var(--red)}
.dp-title{font-size:1.1rem;font-weight:800;color:var(--charcoal);margin-bottom:4px;padding-right:30px}
.dp-layer{font-size:.6rem;color:var(--text-light);text-transform:uppercase;letter-spacing:.04em;margin-bottom:10px}
.dp-desc{font-size:.78rem;color:var(--text-mid);line-height:1.6;margin-bottom:14px}
.dp-section-title{font-size:.68rem;font-weight:700;color:var(--charcoal);margin-bottom:6px;margin-top:14px;padding-top:10px;border-top:1px solid var(--border)}
.dp-conn-list{display:flex;flex-direction:column;gap:4px}
.dp-conn{font-size:.66rem;padding:4px 8px;border-radius:4px;background:var(--bg-off);border:1px solid var(--border);color:var(--text-mid);cursor:pointer}
.dp-conn:hover{border-color:var(--red);color:var(--red)}
.dp-conn.j{background:var(--red-light);border-color:var(--red-mid);color:var(--red);font-weight:600}
.dp-juniper{background:var(--red-light);border:1px solid var(--red-mid);border-radius:8px;padding:10px;margin-top:10px}
.dp-juniper .dpj-name{font-size:.72rem;font-weight:700;color:var(--red)}
.dp-juniper .dpj-desc{font-size:.64rem;color:var(--text-mid);margin-top:3px;line-height:1.4}

/* Flow & Grid tabs — keep compact */
.fl-row{display:flex;align-items:flex-start}
.fl-label{width:110px;min-width:110px;padding:10px 8px;font-size:.62rem;font-weight:700;color:#fff;text-align:center;display:flex;align-items:center;justify-content:center;line-height:1.2}
.fl-label.l1{background:var(--red)}.fl-label.l2{background:#8B3A3A}.fl-label.l3{background:#6B3030}.fl-label.l4{background:#4A2424}.fl-label.l5{background:var(--charcoal)}
.fl-body{flex:1;display:flex;flex-wrap:wrap;gap:8px;padding:12px 16px;background:var(--bg-off);border-bottom:1px solid var(--border);align-items:flex-start;min-height:60px}
.fgroup{border:1.5px solid var(--border);border-radius:8px;padding:8px 10px;background:#fff;display:flex;flex-wrap:wrap;gap:6px;position:relative;cursor:pointer;transition:all .2s}
.fgroup:hover{border-color:var(--red-mid);box-shadow:var(--shadow)}
.fgroup .fg-label{position:absolute;top:-8px;left:10px;background:#fff;padding:0 5px;font-size:.54rem;font-weight:700;color:var(--text-light);text-transform:uppercase;letter-spacing:.03em}
.fbox{background:#fff;border:1.5px solid var(--border);border-radius:7px;padding:6px 10px;min-width:90px;max-width:200px;cursor:pointer;transition:all .2s}
.fbox:hover{border-color:var(--red-mid);box-shadow:var(--shadow);transform:translateY(-1px)}
.fbox .fx-t{font-size:.66rem;font-weight:700;color:var(--charcoal)}
.fbox .fx-c{font-size:.52rem;color:var(--red);font-weight:600;margin-top:1px}
.fbox.fj{border-color:var(--red);background:var(--red-light)}
.fbox .fx-b{display:inline-block;font-size:.48rem;font-weight:700;padding:1px 4px;border-radius:3px;margin-left:3px}
.fx-b.core{background:var(--green);color:#fff}.fx-b.current{background:#00A676CC;color:#fff}.fx-b.partial{background:var(--yellow);color:#fff}.fx-b.gap{background:#CCC;color:#fff}
.flow-arrow-row{display:flex;align-items:center;justify-content:center;height:24px;position:relative}
.flow-arrow-row::before{content:'';position:absolute;left:15%;right:15%;top:50%;height:1px;background:var(--border)}
.flow-arrow-row span{background:#fff;padding:0 12px;font-size:.56rem;color:var(--red);font-weight:700;z-index:1}
.traveler-box{display:flex;align-items:center;justify-content:center;gap:8px;padding:12px 24px;background:var(--bg-off);border:2px solid var(--border);border-radius:10px;font-size:.82rem;font-weight:700;color:var(--charcoal);margin-top:4px}

/* Grid */
.gv-sec{margin-bottom:24px;animation:gvIn .4s ease both}
@keyframes gvIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.gv-hdr{display:flex;align-items:center;gap:9px;margin-bottom:8px;padding-bottom:6px;border-bottom:2px solid var(--border)}
.gv-num{width:24px;height:24px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:.64rem;font-weight:800;color:#fff;flex-shrink:0}
.gv-ttl{font-size:.95rem;font-weight:700;color:var(--charcoal)}
.gv-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:9px}
.gv-card{background:var(--bg);border:1.5px solid var(--border);border-radius:7px;padding:12px 14px;transition:all .2s;cursor:pointer}
.gv-card:hover{border-color:var(--red-mid);box-shadow:var(--shadow)}
.gv-card.hj{border-left:3px solid var(--red)}
.gv-card .gc-t{font-size:.74rem;font-weight:700;color:var(--charcoal);margin-bottom:5px}
.gv-card .gc-r{display:flex;align-items:center;justify-content:space-between;padding:2px 0;border-bottom:1px solid #EDEEF2;font-size:.66rem}
.gv-card .gc-r:last-child{border-bottom:none}
.gc-n{color:var(--text)}.gc-c{font-size:.56rem;color:var(--red);font-weight:600}
.sb{font-size:.5rem;font-weight:700;padding:1px 5px;border-radius:3px;white-space:nowrap}
.sb.core{background:var(--green-bg);color:var(--green);border:1px solid #B5E4D0}.sb.partial{background:var(--yellow-bg);color:var(--yellow);border:1px solid #F0D68A}.sb.gap{background:#F5F0F0;color:#999;border:1px dashed #D8CCCC}.sb.future{background:var(--purple-bg);color:var(--purple);border:1px solid #C5B8E8}

/* ===== CONNECTIVITY v2 — dark hero + product tiles + stacked flow ===== */
.vc-hero{position:relative;width:100vw;margin-left:calc(-50vw + 50%);margin-top:-24px;margin-bottom:48px;padding:56px 48px 74px;background:linear-gradient(135deg,#1a1a1a 0%,#2c2c2c 100%);color:#fff;overflow:hidden}
.vc-hero::before{content:"";position:absolute;inset:0;background:radial-gradient(ellipse at 85% 50%,rgba(192,57,43,.22) 0%,transparent 60%);pointer-events:none}
.vc-hero-inner{max-width:1600px;margin:0 auto;padding:0 16px;position:relative;z-index:1}
.vc-hero .vh-tag{font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.22em;color:rgba(255,255,255,.8);margin-bottom:14px}
.vc-hero .vh-tag::before{content:"";display:inline-block;width:28px;height:2px;background:var(--red);vertical-align:middle;margin-right:12px;margin-bottom:3px}
.vc-hero h2{font-size:2.2rem;font-weight:800;color:#fff;line-height:1.1;letter-spacing:-.01em;max-width:900px;margin-bottom:12px}
.vc-hero h2 .hl{color:var(--red)}
.vc-hero .vh-sub{font-size:.88rem;color:rgba(255,255,255,.78);line-height:1.55;max-width:720px}
.vc-tiles{display:grid;grid-template-columns:repeat(7,1fr);gap:10px;margin:-38px auto 28px;max-width:1500px;padding:0 32px;position:relative;z-index:2}
.vc-tile{background:#fff;border:2px solid var(--border);border-radius:10px;padding:18px 10px;text-align:center;cursor:pointer;transition:all .25s;box-shadow:0 4px 14px rgba(0,0,0,.06);position:relative}
.vc-tile:hover{border-color:var(--red);transform:translateY(-3px);box-shadow:0 10px 26px rgba(192,57,43,.14)}
.vc-tile.on{background:var(--charcoal-deep);border-color:var(--red);box-shadow:0 10px 26px rgba(192,57,43,.3)}
.vc-tile.on .vt-lab{color:#fff}
.vc-tile.on .vt-icon{filter:drop-shadow(0 0 4px rgba(192,57,43,.6))}
.vc-tile .vt-icon{font-size:1.9rem;margin-bottom:6px;display:block;line-height:1}

.vc-tile::after{content:"";position:absolute;left:50%;bottom:-9px;width:0;height:0;border-left:8px solid transparent;border-right:8px solid transparent;border-top:9px solid var(--charcoal-deep);transform:translateX(-50%);opacity:0;transition:opacity .2s}

.cf-layer-count{margin-left:auto;font-size:.56rem;color:var(--text-light);text-transform:uppercase;letter-spacing:.08em;font-weight:600}
.cf-nodes-row{display:flex;flex-wrap:wrap;gap:9px}
.cf-node{flex:1 1 200px;max-width:280px;background:var(--bg-off);border:1.5px solid var(--border);border-radius:8px;padding:11px 13px;position:relative;transition:all .2s}
.cf-node.j{background:#fff;border-color:var(--red);cursor:pointer;padding-left:15px}
.cf-node.j:hover{box-shadow:0 4px 14px rgba(192,57,43,.18);transform:translateY(-1px)}
.cf-node.j::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--red);border-radius:8px 0 0 8px}
.cf-node.gap{background:#FAF8F7;border-style:dashed;border-color:#D8CCCC;opacity:.88}
.cf-node.gap .cf-node-ttl{color:#777}
.cf-node-ttl{font-size:.76rem;font-weight:700;color:var(--charcoal);display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.cf-jpill{font-size:.46rem;font-weight:800;background:var(--red);color:#fff;padding:2px 5px;border-radius:3px;letter-spacing:.06em;text-transform:uppercase}
.cf-node-sub{font-size:.62rem;font-weight:600;color:var(--red);margin-top:3px}

/* ===== DETAIL GRID v2 — stats + sub-nav + legend + filter ===== */
.gv-stats{display:flex;gap:0;background:var(--charcoal-deep);color:#fff;border-radius:12px;padding:18px 26px;margin-bottom:16px;overflow:hidden;position:relative;flex-wrap:wrap}

.gv-stat{flex:1 1 180px;padding:4px 22px;border-right:1px solid rgba(255,255,255,.14);position:relative;z-index:1}

.gv-stat:last-child{border-right:none;padding-right:0}
.gv-stat .gvs-v{font-size:1.6rem;font-weight:800;color:#fff;letter-spacing:-.01em;line-height:1}

function openNodePanel(nodeId){
  const info=NODE_INFO[nodeId];
  if(!info){closePanel();return}
  let h=`<div class="dp-layer">${info.layer}</div><div class="dp-title">${info.title}</div><div class="dp-desc">${info.desc}</div>`;
  if(info.juniper){
    h+=`<div class="dp-juniper"><div class="dpj-name">Juniper Group: ${info.juniper.status}${info.juniper.bu?' — '+info.juniper.bu:''}</div><div class="dpj-desc">${info.juniper.note}</div></div>`;
  }
  if(info.conns&&info.conns.length){
    h+=`<div class="dp-section-title">Connected To</div><div class="dp-conn-list">`;
    info.conns.forEach(c=>{const isJ=c.includes('Juniper')||c.includes('Connectivity')||c.includes('Booking Engine')||c.includes('Dynamic')||c.includes('Lleego')||c.includes('IST')||c.includes('Hotetec')||c.includes('CRM');h+=`<div class="dp-conn${isJ?' j':''}">${c}</div>`});
    h+=`</div>`;
  }
  openPanel(h);
}

function showBU(buId){
  const bu=BUS.find(b=>b.id===buId);if(!bu)return;
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('on'));
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  buDV.classList.add('active');
  let h=`<div class="bu-d-back" onclick="showTab('home')">← Back to Portfolio</div>`;
  h+=`<div class="bu-d-top"><div class="bu-d-logo"><img src="${LOGOS[bu.id]||''}" onerror="this.style.display='none'"></div><div><div class="bu-d-name">${bu.name}</div><div class="bu-d-meta"><span>${bu.hq}</span><span>Founded ${bu.f}</span><span>Acquired ${bu.a}</span>${bu.gm?`<span>GM: ${bu.gm}</span>`:''}</div></div></div>`;
  h+=`<div class="bu-d-desc">${bu.desc}</div>`;
  h+=`<a class="bu-d-link" href="${bu.url}" target="_blank" rel="noopener">Visit Website →</a>`;
  if(bu.facts){h+=`<div class="kf-grid">`;bu.facts.forEach(f=>{h+=`<div class="kf"><div class="kv">${f.v}</div><div class="kl">${f.l}</div></div>`});h+=`</div>`}
  h+=`<div class="sec-title" style="font-size:1rem;margin-top:20px">Products & Solutions</div><div class="sec-bar"></div><div class="prod-grid">`;
  bu.products.forEach(p=>{h+=`<div class="prod-card"><div class="pc-n">${p.n}</div><div class="pc-d">${p.d}</div></div>`});
  h+=`</div>`;
  buDV.innerHTML=h;
}

    let idx=0, activeIsA=true, timer=null, switching=false;
    function setDot(i){dots.forEach((d,j)=>d.classList.toggle('on',j===i));}
    function loadNext(target,src){
      return new Promise((resolve,reject)=>{
        let settled=false;
        const onReady=()=>{if(settled)return;settled=true;target.removeEventListener('canplay',onReady);target.removeEventListener('error',onErr);resolve();};
        const onErr=()=>{if(settled)return;settled=true;target.removeEventListener('canplay',onReady);target.removeEventListener('error',onErr);reject();};
        target.addEventListener('canplay',onReady,{once:true});
        target.addEventListener('error',onErr,{once:true});
        target.src=src;target.load();
        setTimeout(()=>{if(!settled){settled=true;reject();}},8000);
      });
    }
    async function advance(){
      if(switching) return;
      switching=true;
      const nextIdx=(idx+1)%HH_VIDEOS.length;
      const incoming=activeIsA?vB:vA;
      const outgoing=activeIsA?vA:vB;
      try{
        await loadNext(incoming,HH_VIDEOS[nextIdx]);
        try{await incoming.play();}catch(e){}
        incoming.classList.add('active');
        outgoing.classList.remove('active');
        idx=nextIdx;activeIsA=!activeIsA;setDot(idx);
      }catch(e){
        // skip broken video — try next one
        idx=nextIdx;
      }
      switching=false;
    }
    async function jumpTo(i){
      if(switching||i===idx) return;
      switching=true;
      const incoming=activeIsA?vB:vA;
      const outgoing=activeIsA?vA:vB;
      try{
        await loadNext(incoming,HH_VIDEOS[i]);
        try{await incoming.play();}catch(e){}
        incoming.classList.add('active');outgoing.classList.remove('active');
        idx=i;activeIsA=!activeIsA;setDot(idx);
        clearInterval(timer);timer=setInterval(advance,9000);
      }catch(e){}
      switching=false;
    }
    // kick off: load the first video into vA, fade in
    loadNext(vA,HH_VIDEOS[0]).then(()=>{
      vA.play().catch(()=>{});
      vA.classList.add('active');
      timer=setInterval(advance,9000);
    }).catch(()=>{
      // first video failed — try advancing
      setTimeout(advance,500);
      timer=setInterval(advance,9000);
    });
  })();
})();

let fyB=false;let selectedFY=null;
function buildFY(){fyB=true;const w=document.getElementById('view-fy');
  // Hero
  const hero=document.createElement('div');hero.className='fy-hero';
  hero.innerHTML=`<div class="fy-hero-inner">
    <div class="fyh-tag">Capabilities</div>
    <h2>Tell us who you are — we'll show you your <span class="hl">Juniper Group stack</span></h2>
    <div class="fyh-sub">Juniper Group serves the travel industry end-to-end. Pick your company type below and we'll surface the specific products and business units that fit, based on who each company in the portfolio already serves.</div>
  </div>`;
  w.appendChild(hero);

  // Picker (dropdown + tiles)
  const picker=document.createElement('div');picker.className='fy-picker';
  const row=document.createElement('div');row.className='fy-pick-row';
  const ddWrap=document.createElement('div');ddWrap.className='fy-dropdown-wrap';
  ddWrap.innerHTML=`<label class="fy-dropdown-label" for="fy-select">I am a…</label><select class="fy-dropdown" id="fy-select"></select>`;
  row.appendChild(ddWrap);
  const or=document.createElement('span');or.className='fy-or';or.textContent='or pick a tile';
  row.appendChild(or);
  picker.appendChild(row);

  const tiles=document.createElement('div');tiles.className='fy-tile-row';
  CLIENT_TYPES.filter(c=>c.tileTop).forEach(c=>{
    const t=document.createElement('div');t.className='fy-tile';t.dataset.id=c.id;
    t.innerHTML=`<span class="fyt-icon">${c.icon}</span><span class="fyt-lab">${c.label}</span>`;
    t.onclick=()=>setFY(c.id);
    tiles.appendChild(t);
  });
  picker.appendChild(tiles);
  w.appendChild(picker);

  // Results container
  const res=document.createElement('div');res.id='fy-results-slot';
  w.appendChild(res);

  // Populate dropdown
  const sel=document.getElementById('fy-select');
  sel.innerHTML=`<option value="">Select company type…</option>`+CLIENT_TYPES.map(c=>`<option value="${c.id}">${c.full}</option>`).join('');
  sel.onchange=e=>setFY(e.target.value||null);

  renderFY();
}
function setFY(id){selectedFY=id;renderFY()}
function renderFY(){
  // Sync dropdown + tiles to selection
  const sel=document.getElementById('fy-select');if(sel)sel.value=selectedFY||'';
  document.querySelectorAll('.fy-tile').forEach(t=>t.classList.toggle('on',t.dataset.id===selectedFY));
  const slot=document.getElementById('fy-results-slot');slot.innerHTML='';
  if(!selectedFY){
    const e=document.createElement('div');e.className='fy-empty';
    e.innerHTML=`<b>Pick a company type above</b> to see the Juniper Group products and business units built for you. We map every option back to the real client base of each company in the portfolio.`;
    slot.appendChild(e);
    return;
  }
  const ct=CLIENT_TYPES.find(c=>c.id===selectedFY);if(!ct)return;
  const results=document.createElement('div');results.className='fy-results';

  // Count unique BUs in the recommendation
  const bus=new Set();ct.stack.forEach(g=>g.items.forEach(i=>bus.add(i.bu)));
  const totalItems=ct.stack.reduce((a,g)=>a+g.items.length,0);

  // Summary
  const sum=document.createElement('div');sum.className='fy-summary';
  sum.innerHTML=`
    <div class="fys-label">Juniper Group stack for</div>
    <h3>${ct.full} <span class="hl">→</span> <span style="opacity:.9">recommended build</span></h3>
    <div class="fys-nar">${ct.narrative}</div>
    <span class="fys-count">${bus.size} company${bus.size===1?'':'ies'} · ${totalItems} product${totalItems===1?'':'s'}</span>`;
  results.appendChild(sum);

  // Groups
  ct.stack.forEach((g,gi)=>{
    const grp=document.createElement('div');grp.className='fy-group';
    const itemCount=g.items.length;
    grp.innerHTML=`<div class="fy-group-hdr">
      <div class="fy-group-num">${gi+1}</div>
      <div class="fy-group-ttl">${g.g}</div>
      <div class="fy-group-sub">${itemCount} product${itemCount===1?'':'s'}</div>
    </div>`;
    const pg=document.createElement('div');pg.className='fy-prod-grid';
    g.items.forEach(it=>{
      const bu=BUS.find(b=>b.id===it.bu);if(!bu)return;
      const logoSrc=LOGOS[it.bu]||'';
      const card=document.createElement('div');card.className='fy-prod';
      card.innerHTML=`
        <div class="fy-prod-logo">${logoSrc?`<img src="${logoSrc}" alt="${bu.name}">`:`<span style="font-size:.56rem;color:var(--text-light);font-weight:700;text-align:center">${bu.name}</span>`}</div>
        <div class="fy-prod-body">
          <div class="fy-prod-top">
            <div class="fy-prod-name">${it.p}</div>
            <div class="fy-prod-bu">${bu.name}</div>
          </div>
          <div class="fy-prod-why">${it.why}</div>
        </div>
        <span class="fy-prod-arrow">VIEW →</span>`;
      card.onclick=()=>showBU(it.bu);
      pg.appendChild(card);
    });
    grp.appendChild(pg);
    results.appendChild(grp);
  });
  slot.appendChild(results);
}
